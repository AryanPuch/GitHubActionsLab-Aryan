## YAML Template.
---
name: Dependent Jobs

# Controls when the workflow will run
on:
  # Triggers the workflow on push events but only for the "master" branch
  push:
    branches: [ "master" ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: First step in build job
        run: echo "Building application..."
      - name: Second step in build job
        run: sleep 5
  
  # This workflow contains a single job called "test"
  test:
    # Depends on the previous job called "build"
    needs: build
    
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: First step in test job
        run: echo "Running tests..."
      - name: Second step in test job
        run: sleep 5
  
  # This workflow contains a single job called "deploy"
  deploy:
    # Depends on the previous job called "test"
    needs: test
    
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: First step in deploy job
        run: echo "Deploying application..."
      - name: Second step in deploy job
        run: sleep 5
        